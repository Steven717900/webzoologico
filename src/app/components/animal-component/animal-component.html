<!--INICIA TABLA-->
<div class="table-responsive">
    <table class="table table-striped table-sm">
        <thead>
            <style>
                .styled-box {
                    color: black;
                    text-align: center;
                    font-family: 'Times New Roman', Times, serif;
                    border-radius: 5%;
                    border: 1px solid black;
                    padding: 10px;
                    display: inline-block;
                }
            </style>
            <tr>
                <th scope="col">Nombre</th>
                <th scope="col">Edad</th>
                <th scope="col">Tipo</th>
                <th scope="col">Fecha</th>
            </tr>
        </thead>
        <tbody>
            @for (item of animalList; track item._id){
            <tr>
                <td>{{ item.nombre }}</td>
                <td>{{ item.edad }}</td>
                <td>{{ item.tipo }}</td>
                <td>{{ item.fecha }}</td>
            </tr>
            }
        </tbody>
    </table>
</div>
<!--TERMINA TABLA-->
